<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only2 – Video/Audio Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --white: #fff;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --text: #202124;
            --text-light: #5f6368;
            --border: #dadce0;
            --msg-sent: #d2e3fc;
            --msg-received: #fff;
            --danger: #ea4335;
            --success: #34a853;
            --shadow: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.15);
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); min-height:100vh;
            display:flex; align-items:center; justify-content:center;
        }
        .app-container {
            width:100%; max-width:500px; height:100vh; max-height:850px;
            background:#fff; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; overflow:hidden;
            position:relative;
        }
        @media (min-width:520px) {
            .app-container { border-radius:var(--radius); height:90vh; margin:20px; }
        }
        .screen { display:none; flex-direction:column; height:100%; width:100%; position:absolute; top:0; left:0; background:#fff; z-index:1; }
        .screen.active { display:flex; z-index:10; }
        /* Auth */
        .auth-screen { align-items:center; justify-content:center; padding:20px; }
        .auth-card {
            width:100%; max-width:380px; padding:30px 24px; background:#fff;
            border-radius:var(--radius); box-shadow:var(--shadow); text-align:center;
        }
        .auth-card .logo { font-size:42px; margin-bottom:8px; }
        .auth-card h2 { font-size:22px; font-weight:600; }
        .auth-card .subtitle { font-size:13px; color:var(--text-light); margin-bottom:20px; }
        .auth-card label { display:block; text-align:left; font-size:12px; font-weight:600; color:var(--text-light); margin-bottom:4px; }
        .auth-card input {
            width:100%; padding:11px 14px; border:2px solid var(--border); border-radius:var(--radius-sm);
            font-size:15px; margin-bottom:14px; outline:none; background:#fafafa;
        }
        .auth-card input:focus { border-color:var(--primary); background:#fff; }
        .auth-card .btn {
            width:100%; padding:12px; background:var(--primary); color:#fff; border:none;
            border-radius:24px; font-size:15px; font-weight:600; cursor:pointer; margin-top:6px;
        }
        .auth-card .error-msg { color:var(--danger); font-size:13px; min-height:20px; }
        /* Chat header */
        .chat-header {
            display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border);
            background:#fff; gap:10px; flex-shrink:0;
        }
        .chat-header .back-btn { font-size:20px; cursor:pointer; padding:6px; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
        .chat-header .avatar { width:40px; height:40px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .chat-header .user-info { flex:1; }
        .chat-header .user-name { font-weight:600; }
        .chat-header .user-status { font-size:12px; color:var(--success); }
        .chat-header .user-status.offline { color:var(--text-light); }
        .messages-container { flex:1; overflow-y:auto; padding:12px 14px; background:#f8f9fa; }
        .msg-wrapper { max-width:80%; margin-bottom:6px; display:flex; flex-direction:column; }
        .msg-wrapper.sent { align-self:flex-end; }
        .msg-wrapper.received { align-self:flex-start; }
        .msg-wrapper.system { align-self:center; max-width:90%; font-size:12px; color:var(--text-light); margin:8px 0; }
        .msg-bubble { padding:10px 14px; border-radius:18px; font-size:14px; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,0.06); word-break:break-word; }
        .sent .msg-bubble { background:var(--msg-sent); border-bottom-right-radius:4px; }
        .received .msg-bubble { border:1px solid #e8eaed; border-bottom-left-radius:4px; }
        .msg-bubble img { max-width:220px; border-radius:10px; cursor:pointer; display:block; }
        .msg-bubble video, .msg-bubble audio { max-width:220px; border-radius:10px; display:block; }
        .msg-meta { font-size:10px; color:#6b7280; margin-top:3px; display:flex; gap:6px; }
        .sent .msg-meta { justify-content:flex-end; }
        .input-area { display:flex; gap:6px; padding:8px 10px; border-top:1px solid var(--border); background:#fff; flex-shrink:0; }
        .input-area textarea { flex:1; padding:10px 14px; border:2px solid var(--border); border-radius:22px; font-size:14px; resize:none; outline:none; font-family:inherit; }
        .input-area .send-btn { width:38px; height:38px; border-radius:50%; background:var(--primary); color:#fff; border:none; cursor:pointer; font-size:18px; }
        /* Call request modal */
        .call-request-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:90;
            align-items:center; justify-content:center;
        }
        .call-request-overlay.active { display:flex; }
        .call-request-box {
            background:#fff; border-radius:var(--radius); padding:30px; text-align:center; min-width:280px;
        }
        .call-request-box .caller-name { font-size:20px; font-weight:600; margin:10px 0; }
        .call-request-box .btn-group { display:flex; gap:12px; justify-content:center; margin-top:20px; }
        .call-request-box button {
            padding:10px 24px; border:none; border-radius:24px; font-size:15px; font-weight:600; cursor:pointer;
        }
        .accept-btn { background:var(--success); color:#fff; }
        .reject-btn { background:var(--danger); color:#fff; }
        /* Ongoing call modals */
        .call-modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center;
        }
        .call-modal.active { display:flex; }
        .call-modal video { max-width:500px; max-height:60vh; border-radius:var(--radius); background:#111; }
        .call-modal .local-video { position:absolute; bottom:100px; right:20px; width:120px; height:160px; border:3px solid #fff; border-radius:var(--radius-sm); }
        .call-controls { display:flex; gap:20px; margin-top:20px; }
        .ctrl-btn { width:55px; height:55px; border-radius:50%; border:none; font-size:24px; cursor:pointer; }
        .ctrl-btn.end-call { background:var(--danger); color:#fff; }
        .ctrl-btn.mute { background:#555; color:#fff; }
        .msg-popup { display:none; position:fixed; background:#fff; border-radius:8px; box-shadow:var(--shadow-lg); z-index:50; }
        .msg-popup button { display:block; width:100%; padding:10px 16px; border:none; background:none; cursor:pointer; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; z-index:200; opacity:0; transition:opacity 0.3s; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- LOGIN -->
    <div class="screen auth-screen active" id="loginScreen">
        <div class="auth-card">
            <div class="logo">🔐</div><h2>Kirish</h2><p class="subtitle">Faqat 2 kishi uchun</p>
            <label>Login</label><input type="text" id="loginInput" placeholder="Loginni kiriting">
            <label>Parol</label><input type="password" id="passwordInput" placeholder="Parolni kiriting">
            <p class="error-msg" id="loginError"></p>
            <button class="btn" id="loginBtn">➡️ Davom etish</button>
        </div>
    </div>
    <!-- 2FA -->
    <div class="screen auth-screen" id="twoFAScreen">
        <div class="auth-card">
            <div class="logo">🛡️</div><h2>2-Bosqichli Tekshiruv</h2>
            <p class="subtitle" id="twoFAUserLabel">Maxfiy kod</p>
            <label>Kod</label><input type="password" id="twoFAInput" placeholder="Kodni kiriting">
            <p class="error-msg" id="twoFAError"></p>
            <button class="btn" id="twoFABtn">✅ Tasdiqlash</button>
            <button class="btn" style="background:#f1f3f4;color:#333;margin-top:8px;" id="backToLoginBtn">⬅️ Orqaga</button>
        </div>
    </div>
    <!-- CHAT -->
    <div class="screen" id="chatScreen">
        <div class="chat-header">
            <div class="back-btn" id="logoutBtn">←</div>
            <div class="avatar" id="otherAvatar">?</div>
            <div class="user-info">
                <div class="user-name" id="otherUserName">...</div>
                <div class="user-status" id="otherUserStatus">oflayn</div>
            </div>
            <button class="call-btn" id="audioCallBtn">📞</button>
            <button class="call-btn" id="videoCallBtn">📹</button>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <button id="attachBtn">📎</button>
            <div id="attachMenu" style="display:none;position:absolute;bottom:60px;background:#fff;border-radius:8px;box-shadow:var(--shadow-lg);">
                <button id="sendImageBtn">🖼️ Rasm</button>
                <button id="sendVideoBtn">🎬 Video</button>
                <button id="sendAudioFileBtn">🎵 Audio</button>
                <button id="recordVoiceBtn">🎤 Ovozli xabar</button>
            </div>
            <textarea id="messageInput" rows="1" placeholder="Xabar yozing..."></textarea>
            <button class="send-btn" id="sendBtn" disabled>➤</button>
            <input type="file" id="imageFileInput" accept="image/*" hidden>
            <input type="file" id="videoFileInput" accept="video/*" hidden>
            <input type="file" id="audioFileInput" accept="audio/*" hidden>
        </div>
    </div>
    <!-- CALL REQUEST MODAL (qabul qiluvchida chiqadi) -->
    <div class="call-request-overlay" id="callRequestOverlay">
        <div class="call-request-box">
            <div style="font-size:40px;" id="callRequestIcon">📞</div>
            <div class="caller-name" id="callRequestCaller"></div>
            <div id="callRequestType"></div>
            <div class="btn-group">
                <button class="accept-btn" id="acceptCallBtn">✅ Qabul qilish</button>
                <button class="reject-btn" id="rejectCallBtn">❌ Rad etish</button>
            </div>
        </div>
    </div>
    <!-- VIDEO CALL MODAL -->
    <div class="call-modal" id="videoCallModal">
        <video class="remote-video" id="remoteVideo" autoplay playsinline></video>
        <video class="local-video" id="localVideo" autoplay playsinline muted></video>
        <div class="call-controls">
            <button class="ctrl-btn mute" id="videoMuteBtn">🎙️</button>
            <button class="ctrl-btn end-call" id="endVideoCallBtn">📴</button>
        </div>
    </div>
    <!-- AUDIO CALL MODAL -->
    <div class="call-modal" id="audioCallModal">
        <div style="color:#fff;font-size:60px;">📞</div>
        <div class="call-controls">
            <button class="ctrl-btn mute" id="audioMuteBtn">🎙️</button>
            <button class="ctrl-btn end-call" id="endAudioCallBtn">📴</button>
        </div>
    </div>
    <div class="msg-popup" id="msgPopup">
        <button id="editMsgBtn">✏️ Tahrirlash</button>
        <button id="deleteMsgBtn" style="color:red;">🗑️ O'chirish</button>
    </div>
    <div class="toast" id="toast"></div>
</div>

<script>
    // ===================== FIREBASE CONFIG (O'zingiznikini qo'ying) =====================
    const firebaseConfig = {
        apiKey: "AIzaSyC8ZNN4-AQ0dp1DyTkXi8v0URrQ9U6BL0",
        authDomain: "chat-3a98a.firebaseapp.com",
        projectId: "chat-3a98a",
        storageBucket: "chat-3a98a.firebasestorage.app",
        messagingSenderId: "185943495188",
        appId: "1:185943495188:web:4b9c1e2b03683407b5cd01",
        measurementId: "G-ZRVVN55E2M",
        databaseURL: "https://chat-3a98a-default-rtdb.firebaseio.com" // Buni qo'lda qo'shing
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const USERS = {
        'user_1': { password: 'u.s.e.r_1', nickname: 'Jasurbek' },
        'user_2': { password: 'u.s.e.r_2', nickname: 'Dilnura' }
    };
    const TWO_FA_CODE = 'only2';
    let currentUser = null;
    const $ = (s) => document.querySelector(s);

    function showToast(msg) {
        const t = $('#toast');
        t.textContent = msg; t.classList.add('show');
        clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function formatTime(ts) {
        const d = new Date(ts);
        const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
        if (d.toDateString() === new Date().toDateString()) return `Bugun ${hh}:${mm}`;
        return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} ${hh}:${mm}`;
    }

    function getOtherUser() {
        return currentUser?.login === 'user_1' ? {login:'user_2', ...USERS['user_2']} : {login:'user_1', ...USERS['user_1']};
    }

    function generateId() { return 'msg_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }

    // ---------- AUTH ----------
    function showScreen(id) {
        ['loginScreen','twoFAScreen','chatScreen'].forEach(s => $('#'+s).classList.remove('active'));
        $('#'+id).classList.add('active');
    }

    $('#loginBtn').onclick = () => {
        const login = $('#loginInput').value.trim();
        const pass = $('#passwordInput').value;
        $('#loginError').textContent = '';
        if (!USERS[login]) { $('#loginError').textContent = '❌ Foydalanuvchi topilmadi'; return; }
        if (USERS[login].password !== pass) { $('#loginError').textContent = '❌ Parol xato'; return; }
        currentUser = { login, nickname: USERS[login].nickname };
        $('#twoFAUserLabel').textContent = USERS[login].nickname + ', maxfiy kod';
        showScreen('twoFAScreen'); $('#twoFAInput').focus();
    };

    $('#twoFABtn').onclick = () => {
        if ($('#twoFAInput').value.trim() !== TWO_FA_CODE) { $('#twoFAError').textContent = '❌ Noto‘g‘ri kod'; return; }
        initChat();
    };
    $('#backToLoginBtn').onclick = () => { currentUser = null; showScreen('loginScreen'); };

    // ---------- CHAT ----------
    function initChat() {
        showScreen('chatScreen');
        const other = getOtherUser();
        $('#otherUserName').textContent = other.nickname;
        $('#otherAvatar').textContent = other.nickname[0];
        listenMessages();
        listenPresence();
        listenCalls();
        updatePresence(true);
        $('#messageInput').focus();
    }

    $('#logoutBtn').onclick = () => {
        if (currentUser) updatePresence(false);
        db.ref('messages').off();
        db.ref('calls').off();
        db.ref(`status/${getOtherUser()?.login}`).off();
        currentUser = null;
        showScreen('loginScreen');
    };

    function updatePresence(online) {
        if (!currentUser) return;
        db.ref(`status/${currentUser.login}`).set({ online, lastSeen: firebase.database.ServerValue.TIMESTAMP });
    }

    function listenPresence() {
        const other = getOtherUser();
        if (!other) return;
        db.ref(`status/${other.login}`).on('value', snap => {
            const data = snap.val();
            if (!data) return;
            const el = $('#otherUserStatus');
            if (data.online) { el.textContent = 'hozir online 🟢'; el.className = 'user-status'; }
            else {
                el.textContent = 'oxirgi marta: ' + (data.lastSeen ? formatTime(data.lastSeen) : 'nomaʼlum');
                el.className = 'user-status offline';
            }
        });
    }

    function listenMessages() {
        db.ref('messages').off();
        db.ref('messages').on('child_added', snap => renderMessage(snap.val()));
        db.ref('messages').on('child_changed', snap => {
            const el = document.querySelector(`[data-id="${snap.val().id}"]`);
            if (el) el.remove();
            renderMessage(snap.val());
        });
        db.ref('messages').on('child_removed', snap => {
            document.querySelector(`[data-id="${snap.val().id}"]`)?.remove();
        });
    }

    function renderMessage(msg) {
        const container = $('#messagesContainer');
        const wrapper = document.createElement('div');
        if (msg.system) {
            wrapper.className = 'msg-wrapper system';
            wrapper.innerHTML = `<span>📞 ${msg.content}</span>`;
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
            return;
        }
        wrapper.className = 'msg-wrapper ' + (msg.sender === currentUser.login ? 'sent' : 'received');
        wrapper.dataset.id = msg.id;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        if (msg.type === 'text') bubble.textContent = msg.content;
        else if (msg.type === 'image') { const img = document.createElement('img'); img.src = msg.content; bubble.appendChild(img); }
        else if (msg.type === 'video') { const vid = document.createElement('video'); vid.src = msg.content; vid.controls = true; bubble.appendChild(vid); }
        else if (msg.type === 'audio') { const aud = document.createElement('audio'); aud.src = msg.content; aud.controls = true; bubble.appendChild(aud); }
        wrapper.appendChild(bubble);
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        let text = formatTime(msg.timestamp);
        if (msg.edited) text += ' · <span style="font-style:italic">tahrirlangan</span>';
        if (msg.sender === currentUser.login) {
            text += msg.seenAt ? ` · <span style="color:#4a90d9">✅ ${formatTime(msg.seenAt)}</span>` : ' · ✓';
        }
        meta.innerHTML = text;
        wrapper.appendChild(meta);
        if (msg.sender === currentUser.login) {
            wrapper.ondblclick = (e) => { selectedMsgId = msg.id; showPopup(e.clientX, e.clientY); };
        }
        container.appendChild(wrapper);
        container.scrollTop = container.scrollHeight;
        if (msg.sender !== currentUser.login && !msg.seenAt) {
            db.ref(`messages/${msg.id}`).update({ seenAt: firebase.database.ServerValue.TIMESTAMP });
        }
    }

    function sendMessage(content, type='text', system=false) {
        if (!content.trim()) return;
        const msg = {
            id: generateId(), sender: currentUser?.login, content: content.trim(), type,
            timestamp: firebase.database.ServerValue.TIMESTAMP, edited: false, seenAt: null, system: system || false
        };
        db.ref(`messages/${msg.id}`).set(msg);
        $('#messageInput').value = ''; $('#sendBtn').disabled = true;
    }

    let selectedMsgId = null;
    function showPopup(x,y) {
        const p = $('#msgPopup');
        p.style.top = Math.min(y, window.innerHeight-120)+'px';
        p.style.left = Math.min(x, window.innerWidth-160)+'px';
        p.style.display = 'block';
        setTimeout(() => document.addEventListener('click', function h() { p.style.display = 'none'; document.removeEventListener('click',h); }, {once:true}));
    }

    $('#editMsgBtn').onclick = () => {
        $('#msgPopup').style.display = 'none';
        if (!selectedMsgId) return;
        db.ref(`messages/${selectedMsgId}`).once('value').then(snap => {
            const msg = snap.val();
            if (msg?.type === 'text') {
                const newText = prompt('Tahrirlash:', msg.content);
                if (newText?.trim()) db.ref(`messages/${selectedMsgId}`).update({ content: newText.trim(), edited: true });
            } else showToast('Faqat matn tahrirlanadi');
        });
    };
    $('#deleteMsgBtn').onclick = () => {
        $('#msgPopup').style.display = 'none';
        if (selectedMsgId && confirm('O‘chirilsinmi?')) db.ref(`messages/${selectedMsgId}`).remove();
    };

    $('#sendBtn').onclick = () => sendMessage($('#messageInput').value);
    $('#messageInput').oninput = function() { $('#sendBtn').disabled = !this.value.trim(); };
    $('#attachBtn').onclick = (e) => { e.stopPropagation(); $('#attachMenu').style.display = $('#attachMenu').style.display==='block'?'none':'block'; };
    document.addEventListener('click', () => $('#attachMenu').style.display = 'none');
    $('#sendImageBtn').onclick = () => $('#imageFileInput').click();
    $('#sendVideoBtn').onclick = () => $('#videoFileInput').click();
    $('#sendAudioFileBtn').onclick = () => $('#audioFileInput').click();
    function handleFile(file, type) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => sendMessage(e.target.result, type);
        reader.readAsDataURL(file);
    }
    $('#imageFileInput').onchange = function() { handleFile(this.files[0],'image'); this.value=''; };
    $('#videoFileInput').onchange = function() { handleFile(this.files[0],'video'); this.value=''; };
    $('#audioFileInput').onchange = function() { handleFile(this.files[0],'audio'); this.value=''; };

    // Voice recording
    let mediaRecorder, audioChunks, isRecording = false;
    $('#recordVoiceBtn').onclick = async () => {
        if (isRecording) { mediaRecorder.stop(); isRecording=false; $('#recordVoiceBtn').textContent='🎤'; return; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, {type:'audio/webm'});
                const reader = new FileReader();
                reader.onload = e => sendMessage(e.target.result, 'audio');
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t=>t.stop());
            };
            mediaRecorder.start();
            isRecording = true; $('#recordVoiceBtn').textContent='⏹️';
        } catch { showToast('Mikrofon ruxsati yo‘q'); }
    };

    // ===================== CALL SYSTEM =====================
    let activeCallId = null;
    let localStream, pc, callType;

    // Qo'ng'iroq qilish
    async function startCall(type) {
        callType = type;
        const other = getOtherUser();
        activeCallId = generateId();
        // Firebase-ga call so'rovini yozish
        await db.ref(`calls/${activeCallId}`).set({
            caller: currentUser.login,
            receiver: other.login,
            type: type,
            status: 'pending',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Qo\'ng\'iroq qilinmoqda...');
        // O'zgarishlarni kuzatish
        db.ref(`calls/${activeCallId}`).on('value', snap => {
            const callData = snap.val();
            if (!callData) return;
            if (callData.status === 'accepted') {
                // qabul qilindi, endi WebRTC ulanishini boshlash
                startWebRTC(type, true);
            } else if (callData.status === 'rejected' || callData.status === 'ended') {
                if (callData.status === 'rejected') {
                    showToast('Qo\'ng\'iroq rad etildi');
                    sendMessage('Missed audio/video call', 'text', true);
                }
                cleanupCall();
            }
        });
    }

    // Qabul qiluvchi tomonidan qo'ng'iroqlarni kuzatish
    function listenCalls() {
        db.ref('calls').off();
        db.ref('calls').on('child_added', snap => {
            const callData = snap.val();
            if (callData.receiver === currentUser.login && callData.status === 'pending') {
                // Qo'ng'iroq so'rovi keldi
                activeCallId = snap.key;
                showCallRequest(callData);
            }
        });
    }

    function showCallRequest(callData) {
        const overlay = $('#callRequestOverlay');
        $('#callRequestCaller').textContent = USERS[callData.caller]?.nickname || callData.caller;
        $('#callRequestIcon').textContent = callData.type === 'video' ? '📹' : '📞';
        $('#callRequestType').textContent = callData.type === 'video' ? 'Video qo\'ng\'iroq' : 'Audio qo\'ng\'iroq';
        overlay.classList.add('active');
        // Agar boshqa call kelsa, avvalgisini rad etish
    }

    $('#acceptCallBtn').onclick = async () => {
        $('#callRequestOverlay').classList.remove('active');
        if (!activeCallId) return;
        await db.ref(`calls/${activeCallId}`).update({ status: 'accepted' });
        callType = (await db.ref(`calls/${activeCallId}`).once('value')).val().type;
        startWebRTC(callType, false);
    };

    $('#rejectCallBtn').onclick = async () => {
        $('#callRequestOverlay').classList.remove('active');
        if (!activeCallId) return;
        await db.ref(`calls/${activeCallId}`).update({ status: 'rejected' });
        sendMessage('Missed audio/video call', 'text', true);
        cleanupCall();
    };

    async function startWebRTC(type, isCaller) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
            if (type === 'video') {
                $('#localVideo').srcObject = localStream;
                $('#videoCallModal').classList.add('active');
            } else {
                $('#audioCallModal').classList.add('active');
            }
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = e => {
                if (e.candidate) {
                    db.ref(`calls/${activeCallId}/candidates`).push({ candidate: e.candidate, from: currentUser.login });
                }
            };
            pc.ontrack = e => {
                if (type === 'video') $('#remoteVideo').srcObject = e.streams[0];
                else { const audio = new Audio(); audio.srcObject = e.streams[0]; audio.play(); }
            };

            // Signalizatsiya
            const candidatesRef = db.ref(`calls/${activeCallId}/candidates`);
            candidatesRef.on('child_added', snap => {
                const data = snap.val();
                if (data.from !== currentUser.login) {
                    pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            if (isCaller) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await db.ref(`calls/${activeCallId}/offer`).set({ sdp: offer, from: currentUser.login });
                // answer ni kutish
                db.ref(`calls/${activeCallId}/answer`).on('value', async snap => {
                    const ans = snap.val();
                    if (ans && ans.from !== currentUser.login) {
                        await pc.setRemoteDescription(new RTCSessionDescription(ans.sdp));
                    }
                });
            } else {
                // qabul qiluvchi offer ni kutadi
                db.ref(`calls/${activeCallId}/offer`).on('value', async snap => {
                    const offer = snap.val();
                    if (offer && offer.from !== currentUser.login) {
                        await pc.setRemoteDescription(new RTCSessionDescription(offer.sdp));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        await db.ref(`calls/${activeCallId}/answer`).set({ sdp: answer, from: currentUser.login });
                    }
                });
            }
        } catch (err) {
            showToast('Kamera/mikrofon ruxsati kerak');
            if (activeCallId) db.ref(`calls/${activeCallId}`).update({ status: 'ended' });
            cleanupCall();
        }
    }

    function cleanupCall() {
        if (pc) { pc.close(); pc = null; }
        if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
        $('#localVideo').srcObject = null; $('#remoteVideo').srcObject = null;
        $('#videoCallModal').classList.remove('active');
        $('#audioCallModal').classList.remove('active');
        if (activeCallId) {
            db.ref(`calls/${activeCallId}`).off();
            db.ref(`calls/${activeCallId}`).remove();
        }
        activeCallId = null;
        callType = null;
    }

    function endCall() {
        if (activeCallId) {
            db.ref(`calls/${activeCallId}`).update({ status: 'ended' });
            sendMessage('Qo\'ng\'iroq yakunlandi', 'text', true);
        }
        cleanupCall();
    }

    $('#videoCallBtn').onclick = () => startCall('video');
    $('#audioCallBtn').onclick = () => startCall('audio');
    $('#endVideoCallBtn').onclick = endCall;
    $('#endAudioCallBtn').onclick = endCall;
    $('#videoMuteBtn').onclick = () => {
        if (localStream) {
            const enabled = !localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = enabled;
            $('#videoMuteBtn').textContent = enabled ? '🎙️' : '🔇';
        }
    };
    $('#audioMuteBtn').onclick = () => {
        if (localStream) {
            const enabled = !localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = enabled;
            $('#audioMuteBtn').textContent = enabled ? '🎙️' : '🔇';
        }
    };

    window.onbeforeunload = () => { if (currentUser) updatePresence(false); };
</script>
</body>
</html>
